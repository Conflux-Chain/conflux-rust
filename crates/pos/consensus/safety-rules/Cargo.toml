[package]
name = "safety-rules"
version = "0.1.0"
authors = ["Diem Association <opensource@diem.com>"]
license = "Apache-2.0"
publish = false
edition = "2018"

[dependencies]
rand_08 = { workspace = true }
proptest = { version = "1.0.0", optional = true }

consensus-types = { workspace = true }
bcs = "0.1.2"
diem-config = { workspace = true }
diem-crypto = { workspace = true }
diem-global-constants = { workspace = true }
diem-logger = { workspace = true }
diem-secure-storage = { workspace = true }
diem-types = { workspace = true }
serde = { version = "1.0.124", default-features = false }
tempfile = { workspace = true, optional = true }
thiserror = { workspace = true }
log = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
proptest = { workspace = true }
tempfile = { workspace = true }

consensus-types = { workspace = true, features = ["fuzzing"] }
diem-config = { workspace = true, features = ["fuzzing"] }
diem-secure-storage = { workspace = true, features = ["testing"] }

[[bench]]
name = "safety_rules"
harness = false
required-features = ["testing"]

[features]
default = []
fuzzing = [
    "consensus-types/fuzzing",
    "diem-config/fuzzing",
    "proptest",
]
testing = ["diem-secure-storage/testing", "dep:tempfile"]
