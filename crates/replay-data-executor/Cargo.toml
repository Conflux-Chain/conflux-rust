[package]
name = "cfx-replay-data-executor"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true, features = ["derive"] }
cfx-config = { workspace = true }
cfx-execute-helper = { workspace = true }
cfx-executor = { workspace = true }
cfx-internal-common = { workspace = true }
cfx-parameters = { workspace = true }
cfx-statedb = { workspace = true }
cfx-storage = { workspace = true }
cfx-types = { workspace = true }
cfx-vm-types = { workspace = true }
cfxcore = { workspace = true }
# Minimal MPT backend (from the cfx-minimal-execution workspace). Optional:
# only pulled in when the `backend-minimal-mpt` feature selects it as the
# state-trie backend in place of cfx-storage.
cfx-minimal-mpt = { path = "../../../../crates/minimal-mpt", optional = true }
# Shared `.cfxpack` wire-format layer. It pins conflux types to a git rev; the
# workspace `[patch]` (root Cargo.toml) redirects that onto our own crates so
# the `primitives` types it embeds unify with this crate's.
cfxpack = { path = "../../../../crates/cfxpack" }
# Signal-sampling profiler (SIGPROF/setitimer, no perf_event — works where
# perf_event_paranoid is locked down). Enabled by the `profile` feature.
pprof = { version = "0.14", features = ["flamegraph"], optional = true }
primitives = { workspace = true }
rlp = { workspace = true }
serde = { workspace = true, features = ["derive"] }
# Checkpoint (de)serialization for resume. Used only by the minimal-mpt
# backend, but kept as a plain dependency so `Block`'s serde derive
# needs no feature gating.
bincode = "1.3"
snap = "1.1"
tempfile = { workspace = true }
time = { workspace = true }

[features]
# Exactly one state-trie backend must be active. The default is the proven
# cfx-storage backend; select the minimal one with
#   --no-default-features --features backend-minimal-mpt
default = ["backend-cfx-storage"]
backend-cfx-storage = []
backend-minimal-mpt = ["dep:cfx-minimal-mpt"]
# Sample the run with pprof-rs and write flamegraph.svg on exit.
profile = ["dep:pprof"]
# Cross-check the incremental delta-trie root against the stateless oracle on
# every commit (panics on divergence). Build together with backend-minimal-mpt.
verify-incremental = ["cfx-minimal-mpt/verify-incremental"]

# Bins are auto-discovered from src/bin/ (cfx-replay-exec, dump-blame). ckpt-stats
# reads a minimal-mpt checkpoint, so it only builds under that backend.
[[bin]]
name = "ckpt-stats"
path = "src/bin/ckpt-stats.rs"
required-features = ["backend-minimal-mpt"]
